name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Cratebase.slnx

      - name: Build
        run: dotnet build Cratebase.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Cratebase.slnx --configuration Release --no-build --logger trx --results-directory artifacts/test-results
